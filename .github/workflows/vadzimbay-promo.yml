name: Vadzimbay Scheduled Promo

on:
  workflow_dispatch:
  schedule:
    # 12:00 and 15:00 Minsk time. Minsk is UTC+3.
    # Campaign rules are checked in promo.py.
    - cron: "0 9 * * *"
    - cron: "0 12 * * *"

permissions:
  contents: write

concurrency:
  group: vadzimbay-scheduled-promo
  cancel-in-progress: false

jobs:
  publish-promo:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        shell: bash
        run: |
          cat > .env <<'EOF'
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID=${{ secrets.TELEGRAM_CHANNEL_ID }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          LLM_PROVIDER=${{ vars.LLM_PROVIDER || 'groq' }}
          POST_TIME=10:00
          MORNING_WINDOW=09:00-11:50
          EVENING_WINDOW=17:00-20:30
          TIMEZONE=Europe/Minsk
          MAX_NEWS_AGE_HOURS=48
          DRY_RUN=false
          MODERATION_ENABLED=false
          MODERATION_CHAT_ID=${{ secrets.MODERATION_CHAT_ID }}
          MODERATION_TIMEOUT_MINUTES=120
          PUBLISHED_FILE=published.json
          BLOCKED_SOURCES_FILE=blocked_sources.json
          REQUEST_TIMEOUT_SECONDS=15
          OPENAI_MODEL=${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
          GROQ_MODEL=${{ vars.GROQ_MODEL || 'llama-3.3-70b-versatile' }}
          EOF

      - name: Publish scheduled promo
        run: python main.py --promo

      - name: Commit promo state
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          touch published.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add -f published.json
          if git diff --cached --quiet; then
            echo "No published.json changes to commit"
            exit 0
          fi
          git commit -m "Update promo state"
          git push
