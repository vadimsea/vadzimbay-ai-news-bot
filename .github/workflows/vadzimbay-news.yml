name: Vadzimbay Telegram News Bot

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force publishing cycle now, bypass schedule gate"
        required: false
        default: "false"
  schedule:
    # Minsk is UTC+3. Poll every 15 minutes inside the publishing windows.
    # schedule_gate.py picks one deterministic random-ish time and prevents duplicates.
    # Morning window: 09:00-11:50 Minsk -> 06:00-08:50 UTC.
    - cron: "0,15,30,45 6-8 * * *"
    # Evening window: 17:00-20:30 Minsk -> 14:00-17:30 UTC.
    - cron: "0,15,30,45 14-17 * * *"

permissions:
  contents: write

concurrency:
  group: vadzimbay-news-bot
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Schedule gate
        id: gate
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.force }}" = "true" ]; then
              echo "should_run=true" >> "$GITHUB_OUTPUT"
              echo "reason=manual forced run" >> "$GITHUB_OUTPUT"
            else
              python schedule_gate.py
            fi
          else
            python schedule_gate.py
          fi

      - name: Set up Python
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.gate.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Create .env
        if: steps.gate.outputs.should_run == 'true'
        shell: bash
        run: |
          cat > .env <<'EOF'
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID=${{ secrets.TELEGRAM_CHANNEL_ID }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          LLM_PROVIDER=${{ vars.LLM_PROVIDER || 'groq' }}
          POST_TIME=10:00
          MORNING_WINDOW=09:00-11:50
          EVENING_WINDOW=17:00-20:30
          TIMEZONE=Europe/Minsk
          MAX_NEWS_AGE_HOURS=48
          SOURCE_COOLDOWN_RECENT_POSTS=6
          DRY_RUN=false
          MODERATION_ENABLED=true
          MODERATION_CHAT_ID=${{ secrets.MODERATION_CHAT_ID }}
          MODERATION_TIMEOUT_MINUTES=120
          MODERATION_CHOICES=3
          OFFERED_TTL_MINUTES=10
          PUBLISHED_FILE=published.json
          BLOCKED_SOURCES_FILE=blocked_sources.json
          REQUEST_TIMEOUT_SECONDS=15
          OPENAI_MODEL=${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
          GROQ_MODEL=${{ vars.GROQ_MODEL || 'llama-3.3-70b-versatile' }}
          EOF

      - name: Run bot once
        if: steps.gate.outputs.should_run == 'true'
        run: python main.py --once

      - name: Commit published state
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          touch published.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add -f published.json
          if [ -f schedule_state.json ]; then
            git add -f schedule_state.json
          fi
          if git diff --cached --quiet; then
            echo "No published.json changes to commit"
            exit 0
          fi
          git commit -m "Update published news state"
          git push
